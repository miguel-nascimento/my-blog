# The URL the site will be built for
base_url = "https://xn--sckvepb.com/"
title = "miguel-nascimento"

compile_sass = false
theme = "bear"
build_search_index = false
generate_feeds = true
minify_html = true
default_language = "en"

taxonomies = [
  { name = "tags", feed = true },
]

[translations]
no_posts = "No posts yet"
remove_filter = "Remove filter"
filtering_for = "Filtering for"
made_with = "Made with"
table_of_contents = "Table of contents"
language = "language"
site = "site"

[markdown.highlighting]
enabled = true
theme = "ayu-dark"

[extra]
date_format = "%d %b, %Y"
site_title = "miguel's blog"
hide_made_with_line = true

[[extra.main_menu]]
name = "Home"
url = "@/_index.md"

[[extra.main_menu]]
name = "Blog"
url = "@/blog/_index.md"
